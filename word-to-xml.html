<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word转XML - 专利电子申请文件转换工具</title>
<style>
:root{--primary:#104c82;--primary-light:#1a6db5;--warning:#ffc107;--danger:#dc3545;--success:#28a745;--bg:#f7fafc;--card-bg:#fff;--text:#314659;--text-light:#636E72;--border:#e5e7eb;--shadow:0 0 .275rem rgba(49,146,216,0.12);--shadow-lg:0 4px 24px rgba(0,0,0,0.08);--radius:8px;--max-width:1100px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:14px;color:var(--text);background:var(--bg);line-height:1.6;min-height:100vh}
a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
.container{max-width:var(--max-width);margin:0 auto;padding:20px 16px}
.app-header{background:white;border-bottom:3px solid var(--primary);box-shadow:0 2px 8px rgba(0,21,41,0.06);padding:16px 0;margin-bottom:24px}
.app-header .container{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.app-header h1{font-size:1.45rem;color:var(--primary);font-weight:700;display:flex;align-items:center;gap:10px}
.app-header h1::before{content:"";display:inline-block;width:6px;height:28px;background:var(--primary);border-radius:3px}
.app-header .subtitle{font-size:.85rem;color:var(--text-light)}
.card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:24px;overflow:hidden}
.card-header{padding:14px 24px;border-bottom:1px solid var(--border);background:#fafbfc}
.card-header h2{font-size:1.1rem;color:#333;font-weight:600}
.card-body{padding:20px 24px}
.form-group{margin-bottom:18px}
.form-group>label{display:block;font-weight:600;margin-bottom:6px;color:#333}
.btn-row{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}
.btn{display:inline-block;padding:10px 28px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-primary{background:var(--primary);color:white}
.btn-primary:hover{background:var(--primary-light);transform:translateY(-1px);box-shadow:0 2px 8px rgba(16,76,130,0.25)}

.success-box{background:#e8f5e9;border:1px solid #a5d6a7;border-left:4px solid var(--success);color:#1b5e20;padding:12px 16px;border-radius:6px;font-weight:500;margin-top:12px;font-size:.85rem}
.info-badge{display:inline-block;background:#e8f0fe;color:var(--primary);padding:3px 10px;border-radius:10px;font-size:.8rem;font-weight:600;margin-bottom:12px}

.tab-btn{padding:8px 20px;border:none;background:none;cursor:pointer;font-size:.9rem;font-weight:500;color:var(--text-light);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;font-family:inherit}

.spinner-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.7);z-index:999;justify-content:center;align-items:center}
.spinner-overlay.show{display:flex}

#output-area{display:none}#output-area.show{display:block}

.app-footer{text-align:center;padding:24px 0;color:var(--text-light);font-size:.8rem;border-top:1px solid #eee;margin-top:40px}
@media(max-width:768px){.container{padding:12px}.btn-row{flex-direction:column}.btn{width:100%;text-align:center}.tabs{overflow-x:auto}.summary-grid{grid-template-columns:repeat(2,1fr)}}
</style>

<body>
<div class="app-header"><div class="container">
<div><h1>Word转XML</h1><div class="subtitle">将 Word (.docx) 专利申请书转换为 CNIPA 兼容的 XML 格式</div></div>
</div></div>

<div class="container">

<!-- 上传区 -->
<div class="card" id="upload-card">
<div class="card-header"><h2>📄 上传 Word 文档</h2></div>
<div class="card-body">
<label class="upload-zone" id="upload-zone">

<!-- 文档结构预览 -->

<div class="card-header"><h2>📋 文档结构识别</h2></div>
<div class="card-body">
<div class="summary-grid" id="summary-grid"></div>
<div class="tabs" style="margin-top:16px;" id="structure-tabs">
  <button class="tab-btn active" data-tab="tab-structure">文档大纲</button>
  <button class="tab-btn" data-tab="tab-warnings">转换警告</button>
</div>
<div class="tab-content active" id="tab-structure">
  <div class="structure-tree" id="structure-tree" style="max-height:300px"></div>
</div>

<!-- 转换选项 -->

<div class="card-header"><h2>⚙ 转换选项</h2></div>
<div class="card-body">
<div class="form-group">
<label>说明书区块映射方式:</label>
<div class="radio-group" style="display:flex;flex-wrap:wrap;gap:12px">
<label style="display:flex;align-items:center;gap:6px;padding:8px 16px;background:#f5f7fa;border:1px solid #d0d5dd;border-radius:6px;cursor:pointer;font-weight:500">

</label>

  <input type="radio" name="map-mode" value="heading"> 按标题层级映射（Heading1→主区块）

</div></div>

<label>图片处理方式:</label>
<div class="radio-group" style="display:flex;flex-wrap:wrap;gap:12px">
<label style="display:flex;align-items:center;gap:6px;padding:8px 16px;background:#f5f7fa;border:1px solid #d0d5dd;border-radius:6px;cursor:pointer;font-weight:500">
  <input type="radio" name="img-mode" value="extract" checked> Base64嵌入（提取图片数据）
</label>
<label style="display:flex;align-items:center;gap:6px;padding:8px 16px;background:#f5f7fa;border:1px solid #d0d5dd;border-radius:6px;cursor:pointer;font-weight:500">
  <input type="radio" name="img-mode" value="ref"> 仅引用文件名
</label>
<label style="display:flex;align-items:center;gap:6px;padding:8px 16px;background:#f5f7fa;border:1px solid #d0d5dd;border-radius:6px;cursor:pointer;font-weight:500">

<!-- 转换结果 -->
<div class="card" id="output-area">
<div class="card-header">
  <h2 style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
    <span>📝 转换结果 — XML</span>
    <button class="btn btn-success" id="btn-download" style="font-size:13px;padding:8px 20px">⬇ 下载 XML 文件</button>
  </h2>
</div>

<div class="tabs" id="output-tabs">
  <button class="tab-btn active" data-tab="tab-xml-full">完整XML</button>
  <button class="tab-btn" data-tab="tab-xml-desc">说明书</button>
  <button class="tab-btn" data-tab="tab-xml-claims">权利要求书</button>

</div>

<div class="tab-content active" id="tab-xml-full">
  <div class="xml-output" id="xml-full"></div>
</div>

  <div class="xml-output" id="xml-desc"></div>
</div>
<div class="tab-content" id="tab-xml-claims">
  <div class="xml-output" id="xml-claims"></div>
</div>
<div class="tab-content" id="tab-xml-abst">
  <div class="xml-output" id="xml-abst"></div>
</div>

<div style="margin-top:12px">
  <span class="info-badge" id="xml-stat"></span>
  <button class="btn btn-secondary" id="btn-copy" style="font-size:.8rem;padding:6px 16px;margin-left:8px">📋 复制完整XML</button>
</div>

</div>

<div class="spinner-overlay" id="spinner"><div class="spinner"><div class="loader"></div><div>正在转换中，请稍候…</div><div class="wip-notice">大文件可能需要几十秒</div></div></div>

<div class="app-footer"><p>Word转XML专利电子申请文件转换工具 — 遵循 WIPO ST.36 / CNIPA 数据标准规范 · 仅供辅助使用，请以官方工具为最终标准</p></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
(function(){
'use strict';

// ==================== DOM 元素 ====================
const uploadZone = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');
const fileInfo = document.getElementById('file-info');
const fileName = document.getElementById('file-name');
const fileSize = document.getElementById('file-size');
const btnClear = document.getElementById('btn-clear');
const warnSize = document.getElementById('warn-too-large');
const structureArea = document.getElementById('structure-area');
const summaryGrid = document.getElementById('summary-grid');
const structureTree = document.getElementById('structure-tree');
const warningsList = document.getElementById('warnings-list');
const optionsCard = document.getElementById('options-card');
const outputArea = document.getElementById('output-area');
const btnConvert = document.getElementById('btn-convert');
const btnDownload = document.getElementById('btn-download');
const btnCopy = document.getElementById('btn-copy');
const spinner = document.getElementById('spinner');
const xmlFull = document.getElementById('xml-full');
const xmlDesc = document.getElementById('xml-desc');
const xmlClaims = document.getElementById('xml-claims');
const xmlAbst = document.getElementById('xml-abst');
const xmlStat = document.getElementById('xml-stat');

let currentDocxData = null;
let parsedDocument = null;
let generatedXml = null;
let fileZip = null;
let warnings = [];

// ==================== XML 命名空间处理 ====================
// OOXML 元素带有命名空间前缀 (w:p, w:tbl 等), 浏览器 DOMParser 解析后
// localName 不包含前缀但 CSS 选择器无法匹配命名空间元素。
// 使用以下工具函数处理跨命名空间查询。

const NS = {
  W: 'http://schemas.openxmlformats.org/wordprocessingml/2006/main',
  R: 'http://schemas.openxmlformats.org/officeDocument/2006/relationships',
  WP: 'http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing',
  A: 'http://schemas.openxmlformats.org/drawingml/2006/main',
  R2: 'http://schemas.openxmlformats.org/package/2006/relationships',
};

function qs(parent, tagName) {
  // 在命名空间XML中查找元素, 同时尝试命名空间和非命名空间
  if (!parent) return null;
  // 先尝试 getElementsByTagNameNS 通配命名空间
  try {
    const found = parent.getElementsByTagNameNS('*', tagName);
    if (found && found.length > 0) return found[0];
  } catch(e) {}
  // 再尝试直接选择器 (非命名空间HTML)
  let el = parent.querySelector(tagName);
  if (el) return el;
  // 按 localName 遍历查找
  const all = parent.querySelectorAll('*');
  for (const e of all) { if (e.localName === tagName) return e; }
  return null;
}

function qsa(parent, tagName) {
  if (!parent) return [];
  try {
    const found = parent.getElementsByTagNameNS('*', tagName);
    if (found && found.length > 0) return Array.from(found);
  } catch(e) {}
  const results = [];
  const all = parent.querySelectorAll('*');
  for (const e of all) { if (e.localName === tagName) results.push(e); }
  return results;
}

function byTag(parent, tagName) {
  // 使用通配命名空间匹配 OOXML 元素 (如 <w:p>, <w:tbl>)
  if (!parent) return [];
  try {
    const found = parent.getElementsByTagNameNS('*', tagName);
    if (found && found.length > 0) return Array.from(found);
  } catch(e) {}
  return Array.from(parent.getElementsByTagName(tagName));
}

// ==================== 文件处理 ====================
function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function handleFile(file) {
  if (!file.name.endsWith('.docx')) {
    alert('请选择 .docx 格式的文件');
    return;
  }
  currentDocxData = file;
  fileName.textContent = file.name;
  fileSize.textContent = formatSize(file.size);
  fileInfo.classList.add('show');
  warnSize.style.display = 'none';
  resetOutput();
  parseDocument(file);
}

function resetOutput() {
  parsedDocument = null;
  generatedXml = null;
  warnings = [];
  outputArea.classList.remove('show');
  optionsCard.style.display = 'none';
  structureArea.classList.remove('show');
}

fileInput.addEventListener('change', e => {
  if (e.target.files.length > 0) handleFile(e.target.files[0]);
});

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', e => { e.preventDefault(); uploadZone.classList.remove('drag-over'); });
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const files = e.dataTransfer.files;
  if (files.length > 0) handleFile(files[0]);
});

btnClear.addEventListener('click', () => {
  currentDocxData = null;
  fileZip = null;
  fileInput.value = '';
  fileInfo.classList.remove('show');
  warnSize.style.display = 'none';
  resetOutput();
  structureArea.classList.remove('show');
  summaryGrid.innerHTML = '';
  structureTree.textContent = '';
});

// ==================== 文档解析 ====================
async function parseDocument(file) {
  showSpinner();
  warnings = [];
  try {
    const arrayBuffer = await file.arrayBuffer();
    fileZip = await JSZip.loadAsync(arrayBuffer);

    // 读取核心文件
    const docXmlStr = await fileZip.file('word/document.xml')?.async('string');
    if (!docXmlStr) throw new Error('无法读取 word/document.xml');

    const stylesStr = await fileZip.file('word/styles.xml')?.async('string') || '';
    const relsStr = await fileZip.file('word/_rels/document.xml.rels')?.async('string') || '';

    const parser = new DOMParser();
    const docXml = parser.parseFromString(docXmlStr, 'application/xml');
    // 检测解析错误
    if (docXml.querySelector('parsererror')) {
      console.warn('XML解析错误, 尝试备用方案');
    }
    const stylesXml = stylesStr ? parser.parseFromString(stylesStr, 'application/xml') : null;
    const relsXml = relsStr ? parser.parseFromString(relsStr, 'application/xml') : null;

    console.log('relsXml parsed, root:', relsXml ? relsXml.documentElement?.localName : 'null');

    // 解析样式名称映射
    const styleMap = parseStyles(stylesXml);

    // 解析关系（图片映射）
    const relMap = parseRelationships(relsXml);

    // 解析正文内容
    parsedDocument = parseBody(docXml, styleMap, relMap, fileZip);

    // 预加载图片的base64数据
    await preloadImageData(parsedDocument.images, fileZip);

    // 显示结构
    displayStructure(parsedDocument);

    optionsCard.style.display = 'block';
    structureArea.classList.add('show');
    hideSpinner();
  } catch (err) {
    hideSpinner();
    showError('解析文档失败: ' + err.message);
    console.error(err);
  }
}

function parseStyles(stylesXml) {
  const map = {};
  if (!stylesXml) return map;
  const styles = findAllByLocalName(stylesXml, 'style');
  styles.forEach(s => {
    const id = s.getAttribute('w:styleId');
    const nameEl = qs(s, 'name');
    const name = nameEl ? nameEl.getAttribute('w:val') : '';
    // 读取 outlineLvl 用于标题检测
    const pPr = qs(s, 'pPr');
    let outlineLvl = -1;
    if (pPr) {
      const olEl = qs(pPr, 'outlineLvl');
      if (olEl) outlineLvl = parseInt(olEl.getAttribute('w:val') || '-1');
    }
    map[id] = { name: name, id: id, outlineLvl: outlineLvl };
  });
  return map;
}

function parseRelationships(relsXml) {
  const map = {};
  if (!relsXml) return map;
  const rels = findAllByLocalName(relsXml, 'Relationship');
  rels.forEach(r => {
    const id = r.getAttribute('Id');
    const target = r.getAttribute('Target');
    const type = r.getAttribute('Type');
    if (id && target) {
      map[id] = { target: target, type: type || '' };
    }
  });
  return map;
}

function parseBody(docXml, styleMap, relMap, zip) {
  // 从 XML 文档中获取 body 元素 (处理命名空间)
  const root = docXml.documentElement || docXml;
  const body = qs(root, 'body') || docXml.getElementsByTagName('body')[0] || docXml.getElementsByTagNameNS('*', 'body')[0];
  if (!body) return { sections: [], tables: [], images: [], paragraphs: 0 };

  const elements = Array.from(body.children);
  const sections = [];
  const tables = [];
  const images = [];
  let paraCount = 0;
  let currentSection = { type: 'preamble', title: '前言', paragraphs: [], level: 0 };

  // 注意: 顺序很重要! 更具体的关键词必须排在更通用的前面
  // 'abstract' 的 "说明书摘要" 必须在 'description' 的 "说明书" 前面
  // 'drawings' 的 "说明书附图" 也必须在 'description' 前面
  const SECTION_KEYWORDS = {
    'abstract': ['说明书摘要','说明书 摘要','摘 要','摘要'],
    'drawings': ['说明书附图','说明书 附图','附 图'],
    'description-of-drawings': ['附图说明','附图描述','图式简单说明'],
    'technical-field': ['技术领域','技术 领域'],
    'background-art': ['背景技术','背景 技术'],
    'disclosure': ['发明内容','发明概述','发明公开','发明 内容'],
    'description-of-embodiments': ['具体实施方式','实施方式','实施例','优选实施例','详细描述'],
    'industrial-applicability': ['工业实用性'],
    'sequence-listing': ['序列表'],
    'claims': ['权利要求书','权利要求','权 利 要 求 书','权 利 要 求'],
    'description': ['说明书','说 明 书'],
  };

  function getSectionType(text) {
    if (!text) return null;
    const clean = text.replace(/\s+/g, '').trim();
    for (const [type, keywords] of Object.entries(SECTION_KEYWORDS)) {
      for (const kw of keywords) {
        if (clean.includes(kw.replace(/\s+/g,''))) return type;
      }
    }
    return null;
  }

  elements.forEach(el => {
    const tag = el.localName || el.tagName;

    if (tag === 'p') {
      const text = extractText(el);
      const styleVal = getStyleId(el);
      const styleInfo = styleMap[styleVal] || {};
      const styleName = (styleInfo.name || '').toLowerCase();
      const outlineLvl = styleInfo.outlineLvl !== undefined ? styleInfo.outlineLvl : -1;
      const numId = getNumId(el);
      const numLevel = getNumLevel(el);

      // 判断是否是标题: style name contains "heading", or outlineLvl >= 0
      const isHeading = styleName.includes('heading') ||
                        /^heading\s*\d+$/.test(styleName) ||
                        styleName.includes('标题') ||
                        outlineLvl >= 0 ||
                        /^[12]$/.test(styleVal);

      // 检测 section type from text
      const detectedType = getSectionType(text);

      if (isHeading || detectedType || styleVal === '2' || styleVal === '3' || styleVal === '4') {
        // 保存前一个 section
        if (currentSection.paragraphs.length > 0 || currentSection.title) {
          sections.push(currentSection);
        }

        let level = 1;
        if (outlineLvl >= 0) {
          level = outlineLvl + 1;
        } else if (styleName.includes('heading 3') || styleName.includes('heading3')) {
          level = 3;
        } else if (styleName.includes('heading 2') || styleName.includes('heading2') || styleVal === '3' || styleVal === '4') {
          level = 2;
        }

        currentSection = {
          type: detectedType || 'heading',
          title: text || '(无标题)',
          paragraphs: [],
          level: level,
          styleVal: styleVal
        };
      } else if (text.trim()) {
        currentSection.paragraphs.push({
          text: text,
          xml: el.outerHTML,
          numId: numId,
          numLevel: numLevel,
          styleVal: styleVal,
          formattedText: extractFormattedText(el)
        });
        paraCount++;
      }

      // 始终扫描段落中的图片（不管是否有文字，支持多种嵌入方式）
      const paraImages = extractAllImages(el, relMap, zip);
      paraImages.forEach(imgData => {
        images.push(imgData);
        currentSection.paragraphs.push({
          text: '[图片: ' + (imgData.fileName || 'unknown') + ']',
          xml: el.outerHTML,
          image: imgData
        });
        paraCount++;
      });
    } else if (tag === 'tbl') {
      const tableData = parseTable(el);
      tables.push(tableData);
      currentSection.paragraphs.push({
        text: '[表格: ' + (tableData.title || tableData.rows + '行' + tableData.cols + '列') + ']',
        table: tableData,
        xml: el.outerHTML
      });
      paraCount++;
    }
  });

  // 保存最后一个 section
  if (currentSection.paragraphs.length > 0 || currentSection.title) {
    sections.push(currentSection);
  }

  return { sections, tables, images, paragraphs: paraCount };
}

function getStyleId(paraEl) {
  const pPr = qs(paraEl, 'pPr');
  if (!pPr) return '';
  const pStyle = qs(pPr, 'pStyle');
  return pStyle ? (pStyle.getAttribute('w:val') || '') : '';
}

function getNumId(paraEl) {
  const pPr = qs(paraEl, 'pPr');
  if (!pPr) return null;
  const numPr = qs(pPr, 'numPr');
  if (!numPr) return null;
  const numId = qs(numPr, 'numId');
  return numId ? numId.getAttribute('w:val') : null;
}

function getNumLevel(paraEl) {
  const pPr = qs(paraEl, 'pPr');
  if (!pPr) return null;
  const numPr = qs(pPr, 'numPr');
  if (!numPr) return null;
  const ilvl = qs(numPr, 'ilvl');
  return ilvl ? parseInt(ilvl.getAttribute('w:val') || '0') : 0;
}

function extractText(paraEl) {
  const texts = byTag(paraEl, 't');
  let result = '';
  texts.forEach(t => {
    if (t.textContent) result += t.textContent;
  });
  return result;
}

function extractFormattedText(paraEl) {
  const runs = byTag(paraEl, 'r');
  if (runs.length === 0) {
    const texts = byTag(paraEl, 't');
    return Array.from(texts).map(t => escapeXml(t.textContent || '')).join('');
  }

  let result = '';
  runs.forEach(r => {
    const isBold = qs(r, 'b') || qs(r, 'bCs');
    const isItalic = qs(r, 'i') || qs(r, 'iCs');
    let isSuper = false, isSub = false;
    const vertAlign = qs(r, 'vertAlign');
    if (vertAlign) {
      const v = vertAlign.getAttribute('w:val') || '';
      if (v === 'superscript') isSuper = true;
      if (v === 'subscript') isSub = true;
    }
    let content = '';
    byTag(r, 't').forEach(t => { content += escapeXml(t.textContent || ''); });

    if (isSuper) content = '<sup>' + content + '</sup>';
    else if (isSub) content = '<sub>' + content + '</sub>';
    if (isBold) content = '<b>' + content + '</b>';
    if (isItalic) content = '<i>' + content + '</i>';

    result += content;
  });

  return result;
}

// TreeWalker 辅助: 查找所有指定 localName 的后代元素 (绕过命名空间兼容问题)
function findAllByLocalName(root, localName) {
  const results = [];
  // 如果传入的是 Document 节点, 使用 documentElement
  const startNode = (root.nodeType === 9) ? root.documentElement : root;
  if (!startNode) return results;

  const walker = startNode.ownerDocument.createTreeWalker(
    startNode,
    NodeFilter.SHOW_ELEMENT,
    {
      acceptNode: function(node) {
        return (node.localName === localName) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_SKIP;
      }
    }
  );
  while (walker.nextNode()) {
    results.push(walker.currentNode);
  }
  return results;
}

// 获取命名空间属性值 (兼容 getAttribute 和 getAttributeNS)
function getAttr(el, prefix, localName, nsUri) {
  // 先尝试 getAttribute (带前缀)
  const val1 = el.getAttribute(prefix + ':' + localName);
  if (val1) return val1;
  // 再尝试 getAttributeNS (命名空间URI)
  if (nsUri) {
    const val2 = el.getAttributeNS(nsUri, localName);
    if (val2) return val2;
  }
  return null;
}

// 通用的图片提取函数 — 使用 TreeWalker 可靠地扫描所有嵌入方式
function extractAllImages(paraEl, relMap, zip) {
  const results = [];
  const R_NS = 'http://schemas.openxmlformats.org/officeDocument/2006/relationships';

  // 1. 查找所有 a:blip 元素 (TreeWalker 不依赖命名空间)
  const blips = findAllByLocalName(paraEl, 'blip');

  if (blips.length > 0) {
    blips.forEach(blip => {
      const embed = getAttr(blip, 'r', 'embed', R_NS);
      if (!embed) return;
      const rel = relMap[embed];
      if (rel) {
        const ext = rel.target.split('.').pop().toLowerCase();
        results.push({
          embedId: embed,
          fileName: rel.target.split('/').pop(),
          path: 'word/' + (rel.target.startsWith('media/') ? rel.target : 'media/' + rel.target),
          ext: ext,
          relType: rel.type
        });
      } else {
        results.push({ embedId: embed, fileName: 'blip-' + embed, ext: 'png' });
      }
    });
  }

  // 2. 查找 VML 图片 (w:pict > v:imagedata)
  if (results.length === 0) {
    const pictEls = findAllByLocalName(paraEl, 'pict');
    pictEls.forEach(pict => {
      const imgDataEls = findAllByLocalName(pict, 'imagedata');
      imgDataEls.forEach(imgDataEl => {
        const imgId = getAttr(imgDataEl, 'r', 'id', R_NS) || getAttr(imgDataEl, 'o', 'relid', null);
        if (imgId && relMap[imgId]) {
          const rel = relMap[imgId];
          results.push({
            embedId: imgId,
            fileName: rel.target.split('/').pop(),
            path: 'word/' + rel.target,
            ext: rel.target.split('.').pop().toLowerCase(),
            relType: rel.type
          });
        } else {
          const title = getAttr(imgDataEl, 'o', 'title', null) || '';
          results.push({ embedId: imgId || '', fileName: title || 'vml-image', ext: 'wmf' });
        }
      });
    });
  }

  // 3. 查找 OLE 对象 (w:object > o:OLEObject)
  if (results.length === 0) {
    const objEls = findAllByLocalName(paraEl, 'object');
    objEls.forEach(obj => {
      const oleEls = findAllByLocalName(obj, 'OLEObject');
      oleEls.forEach(oleEl => {
        const oleId = getAttr(oleEl, 'r', 'id', R_NS);
        if (oleId && relMap[oleId]) {
          const rel = relMap[oleId];
          results.push({
            embedId: oleId,
            fileName: rel.target.split('/').pop(),
            path: 'word/' + rel.target,
            ext: rel.target.split('.').pop().toLowerCase(),
            relType: 'ole'
          });
        }
      });
    });
  }

  return results;
}

function extractImageInfo(drawingEl, paraEl, relMap, zip) {
  const container = qs(drawingEl, 'inline') || qs(drawingEl, 'anchor') || drawingEl;
  const blip = qs(container, 'blip');
  if (blip) {
    const embed = blip.getAttribute('r:embed');
    const rel = relMap[embed];
    if (rel && zip) {
      const mediaPath = 'word/' + (rel.target.startsWith('media/') ? rel.target : 'media/' + rel.target);
      const ext = rel.target.split('.').pop().toLowerCase();
      return {
        embedId: embed,
        fileName: rel.target.split('/').pop(),
        path: mediaPath,
        ext: ext,
        relType: rel.type
      };
    }
    return { embedId: embed, fileName: 'unknown' };
  }
  return null;
}

function parseTable(tblEl) {
  const rows = [];
  let maxCols = 0;

  byTag(tblEl, 'tr').forEach(tr => {
    const cells = [];
    byTag(tr, 'tc').forEach(tc => {
      let cellText = '';
      byTag(tc, 't').forEach(t => { if (t.textContent) cellText += t.textContent; });

      const tcPr = qs(tc, 'tcPr');
      let gridSpan = 1;
      if (tcPr) {
        const gridSpanEl = qs(tcPr, 'gridSpan');
        if (gridSpanEl) gridSpan = parseInt(gridSpanEl.getAttribute('w:val') || '1');
      }

      cells.push({ text: cellText, gridSpan: gridSpan });
    });
    rows.push(cells);
    maxCols = Math.max(maxCols, cells.reduce((s, c) => s + c.gridSpan, 0));
  });

  const tblPr = qs(tblEl, 'tblPr');
  const titleEl = tblPr ? qs(tblPr, 'tblCaption') : null;
  const title = titleEl ? titleEl.getAttribute('w:val') || '' : '';

  let headers = [];
  let dataRows = rows;
  if (rows.length > 0 && tblPr) {
    const tblLook = qs(tblPr, 'tblLook');
    if (tblLook && tblLook.getAttribute('w:firstRow') === '1') {
      headers = rows[0].map(c => c.text);
      dataRows = rows.slice(1);
    }
  }

  return {
    title: title,
    rows: rows.length,
    cols: maxCols,
    headers: headers,
    data: dataRows,
    xml: tblEl.outerHTML
  };
}

// ==================== 显示文档结构 ====================
function displayStructure(doc) {
  const { sections, tables, images, paragraphs } = doc;

  // 统计汇总
  const sectionCount = sections.length;
  const headingCount = sections.filter(s => s.paragraphs.length === 0).length;

  summaryGrid.innerHTML = `
    <div class="summary-item"><div class="count">${sectionCount}</div><div class="label">区块(Sections)</div></div>
    <div class="summary-item"><div class="count">${paragraphs}</div><div class="label">段落/元素</div></div>
    <div class="summary-item"><div class="count">${tables.length}</div><div class="label">表格</div></div>
    <div class="summary-item"><div class="count">${images.length}</div><div class="label">图片</div></div>
  `;

  // 文档大纲
  let tree = '';
  let pNum = 0;

  sections.forEach((sec, i) => {
    const indent = '  '.repeat(Math.max(0, sec.level - 1));
    let label = '';
    const typeColors = {
      'abstract': 'abstract',
      'description': 'description',
      'claims': 'claims',
      'drawings': 'drawings',
      'technical-field': 'description',
      'background-art': 'description',
      'disclosure': 'description',
      'description-of-drawings': 'description',
      'description-of-embodiments': 'description',
      'industrial-applicability': 'description',
      'sequence-listing': 'description',
    };
    const typeLabel = sec.type !== 'heading' && sec.type !== 'preamble' ?
      ` <span class="section-label ${typeColors[sec.type] || 'description'}">${getTypeCnName(sec.type)}</span>` : '';

    tree += `${indent}▸ <strong>${escapeHtml(sec.title || '(无标题)')}</strong>${typeLabel} [${sec.paragraphs.length} 项]\n`;

    sec.paragraphs.forEach(p => {
      const preview = (p.text || '').substring(0, 80).replace(/\n/g, ' ');
      tree += `${indent}  ${pNum+1}. ${escapeHtml(preview)}${preview.length >= 80 ? '…' : ''}\n`;
      pNum++;
    });
  });

  structureTree.innerHTML = tree;

  // 警告
  warningsList.innerHTML = '';
  if (warnings.length === 0) {
    warningsList.innerHTML = '<div class="success-box">✅ 未检测到转换问题</div>';
  } else {
    warnings.forEach(w => {
      warningsList.innerHTML += `<div class="warning-box">⚠ ${escapeHtml(w)}</div>`;
    });
  }

  // 检测常见问题
  const hasAbstract = sections.some(s => s.type === 'abstract');
  const hasClaims = sections.some(s => s.type === 'claims');
  const hasDesc = sections.some(s => s.type === 'description' || s.type === 'technical-field' || s.type === 'disclosure');

  if (images.length > 0) {
    warningsList.innerHTML += `<div class="warning-box">⚠ 文档包含 ${images.length} 张图片。根据选项，图片将嵌入为Base64或仅引用文件名。EMF格式图片在浏览器中预览可能不正常，但不影响XML文件。</div>`;
  }
  if (!hasAbstract) {
    warningsList.innerHTML += '<div class="warning-box">⚠ 未检测到"摘要"区块，请确保文档中包含说明书摘要</div>';
  }
  if (!hasClaims) {
    warningsList.innerHTML += '<div class="warning-box">⚠ 未检测到"权利要求书"区块，请确保文档中包含权利要求</div>';
  }
  if (images.length > 10) {
    warningsList.innerHTML += `<div class="warning-box">⚠ 文档包含 ${images.length} 张图片，Base64嵌入将显著增大XML体积。建议选择"仅引用文件名"或使用官方工具。</div>`;
  }
}

function getTypeCnName(type) {
  const names = {
    'abstract': '摘要',
    'description': '说明书',
    'technical-field': '技术领域',
    'background-art': '背景技术',
    'disclosure': '发明内容',
    'description-of-drawings': '附图说明',
    'description-of-embodiments': '具体实施方式',
    'claims': '权利要求',
    'drawings': '附图',
    'industrial-applicability': '工业实用性',
    'sequence-listing': '序列表',
  };
  return names[type] || type;
}

// ==================== 图片数据预加载 ====================
async function preloadImageData(images, zip) {
  const imgMode = document.querySelector('input[name="img-mode"]:checked')?.value || 'extract';
  if (imgMode === 'skip') return;

  for (const img of images) {
    if (img.path && !img.base64 && zip) {
      try {
        const file = zip.file(img.path);
        if (file) {
          if (imgMode === 'extract') {
            img.base64 = await file.async('base64');
          }
          // 也存储Uint8Array用于其他用途
          img.uint8 = await file.async('uint8array');
          console.log('Loaded image:', img.fileName, 'base64 len:', img.base64 ? img.base64.length : 0);
        } else {
          console.warn('Image file not found in ZIP:', img.path);
        }
      } catch(e) {
        console.warn('Failed to load image:', img.path, e.message);
      }
    }
  }
}

// ==================== XML 生成 ====================
async function generateXml() {
  if (!parsedDocument) return null;
  showSpinner();

  try {
    const doc = parsedDocument;
    const imgMode = document.querySelector('input[name="img-mode"]:checked')?.value || 'extract';
    const mapMode = document.querySelector('input[name="map-mode"]:checked')?.value || 'auto';

    warnings = [];
    const sections = [...doc.sections];

    // 智能区块映射
    let abstractSections = [];
    let descSections = [];
    let claimsSections = [];
    let drawingsSections = [];

    let currentContext = 'description';
    let inventionTitle = '';

    sections.forEach(sec => {
      if (!sec) return;

      if (sec.type === 'abstract') {
        currentContext = 'abstract';
        abstractSections.push(sec);
      } else if (sec.type === 'claims') {
        currentContext = 'claims';
        claimsSections.push(sec);
      } else if (sec.type === 'drawings') {
        currentContext = 'drawings';
        drawingsSections.push(sec);
      } else if (sec.type === 'description' ||
                 sec.type === 'technical-field' ||
                 sec.type === 'background-art' ||
                 sec.type === 'disclosure' ||
                 sec.type === 'description-of-drawings' ||
                 sec.type === 'description-of-embodiments' ||
                 sec.type === 'industrial-applicability' ||
                 sec.type === 'sequence-listing') {
        currentContext = 'description';
        descSections.push(sec);

        // 第一个description标题作为发明名称
        if (!inventionTitle && sec.type === 'description') {
          inventionTitle = sec.title.replace(/^说明书\s*/,'').trim();
          if (!inventionTitle) inventionTitle = sec.title;
        }
      } else if (sec.type === 'heading') {
        // 根据标题关键词判断归属
        const title = (sec.title || '').replace(/\s+/g, '');
        if (title.includes('摘要') || title.includes('Abstract')) {
          currentContext = 'abstract';
          abstractSections.push(sec);
        } else if (title.includes('权利要求') || title.includes('Claims')) {
          currentContext = 'claims';
          claimsSections.push(sec);
        } else if (title.includes('附图') || title.includes('Drawings')) {
          currentContext = 'drawings';
          drawingsSections.push(sec);
        } else {
          currentContext = 'description';
          descSections.push(sec);
        }
      } else {
        switch (currentContext) {
          case 'abstract': abstractSections.push(sec); break;
          case 'claims': claimsSections.push(sec); break;
          case 'drawings': drawingsSections.push(sec); break;
          default: descSections.push(sec);
        }
      }
    });

    // 生成发明名称
    if (!inventionTitle && descSections.length > 0) {
      inventionTitle = descSections[0].title || '未命名发明';
    }

    // 构建 XML
    let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
    xml += '<!DOCTYPE application-body PUBLIC "-//WIPO//DTD APPLICATION BODY 1.1//EN"\n';
    xml += '  "application-body-v1-1.dtd">\n\n';
    xml += '<application-body id="app001" lang="zh" country="CN" dtd-version="1.1">\n\n';

    // 说明书
    xml += generateDescriptionXml(descSections, inventionTitle, imgMode);

    // 权利要求
    xml += generateClaimsXml(claimsSections);

    // 摘要
    xml += generateAbstractXml(abstractSections);

    // 附图
    if (drawingsSections.length > 0 || doc.images.length > 0) {
      xml += generateDrawingsXml(drawingsSections, doc.images, imgMode);
    }

    xml += '</application-body>\n';

    generatedXml = xml;
    hideSpinner();
    return xml;
  } catch (err) {
    hideSpinner();
    showError('生成XML失败: ' + err.message);
    console.error(err);
    return null;
  }
}

function generateDescriptionXml(sections, title, imgMode) {
  let xml = '  <description id="desc" lang="zh">\n';
  xml += '    <invention-title lang="zh">' + escapeXml(title || '未命名发明') + '</invention-title>\n';

  let pId = 1;

  // 为已识别的特殊区块生成对应的XML元素
  const specialTypes = {
    'technical-field': { el: 'technical-field', id: 'tf' },
    'background-art': { el: 'background-art', id: 'bart' },
    'disclosure': { el: 'disclosure', id: 'dicl' },
    'description-of-drawings': { el: 'description-of-drawings', id: 'desd' },
    'description-of-embodiments': { el: 'description-of-embodiments', id: 'demb' },
    'industrial-applicability': { el: 'industrial-applicability', id: 'inap' },
    'sequence-listing': { el: 'sequence-list-text', id: 'seql' },
  };

  // 按类型分组
  let currentSpecialType = null;
  let specialContent = [];

  function flushSpecialContent() {
    if (!currentSpecialType) return '';
    const spec = specialTypes[currentSpecialType];
    if (!spec) return '';
    let result = '';
    result += '    <' + spec.el + ' id="' + spec.id + '">\n';
    if (specialContent.length > 0) {
      specialContent.forEach(para => {
        result += formatXmlParagraph(para, pId++, '      ');
      });
    }
    result += '    </' + spec.el + '>\n';
    currentSpecialType = null;
    specialContent = [];
    return result;
  }

  sections.forEach(sec => {
    if (specialTypes[sec.type]) {
      xml += flushSpecialContent();
      currentSpecialType = sec.type;

      // 添加 section 标题
      if (sec.title && !Object.values(specialTypes).some(t => sec.title.includes(t))) {
        specialContent.push({ text: sec.title, heading: true, level: sec.level });
      }
      sec.paragraphs.forEach(p => specialContent.push(p));
    } else if (sec.type === 'description') {
      xml += flushSpecialContent();
      if (sec.paragraphs.length > 0) {
        sec.paragraphs.forEach(p => {
          xml += formatXmlParagraph(p, pId++);
        });
      }
    } else {
      if (currentSpecialType) {
        sec.paragraphs.forEach(p => specialContent.push(p));
      } else {
        if (sec.paragraphs.length > 0) {
          sec.paragraphs.forEach(p => {
            xml += formatXmlParagraph(p, pId++);
          });
        }
      }
    }
  });

  xml += flushSpecialContent();

  xml += '  </description>\n\n';
  return xml;
}

function formatXmlParagraph(para, pId, extraIndent) {
  const indent = extraIndent || '    ';
  let content = '';

  if (para.heading) {
    return indent + '<heading level="1">' + escapeXml(para.text || '') + '</heading>\n';
  }

  if (para.table) {
    content = generateTableXml(para.table, pId, indent);
  } else if (para.image) {
    const imgData = para.image;
    let imgTag = '<img id="img' + padNum(pId) + '"';
    imgTag += ' file="' + escapeXml(imgData.fileName || 'unknown') + '"';
    imgTag += ' img-content="drawing"';
    imgTag += ' img-format="' + (imgData.ext || 'png') + '"';
    // 如果有base64数据，嵌入为data URI
    if (imgData.base64) {
      imgTag += ' embedded="true"';
      imgTag += ' encoding="base64"';
      // 将base64数据放在image元素的文本内容中
      content = indent + '<p id="p' + padNum(pId) + '" num="' + padNum(pId) + '">\n' +
        indent + '  ' + imgTag + '>' + imgData.base64 + '</img>\n' +
        indent + '</p>\n';
    } else {
      content = indent + '<p id="p' + padNum(pId) + '" num="' + padNum(pId) + '">' +
        imgTag + '/>\n' + indent + '</p>\n';
    }
  } else {
    const formatted = para.formattedText || escapeXml(para.text || '');
    content = indent + '<p id="p' + padNum(pId) + '" num="' + padNum(pId) + '">' + formatted + '</p>\n';
  }

  return content;
}

function generateTableXml(table, pId, indent) {
  let xml = '';
  const pad = indent;
  xml += pad + '<tables id="tab' + padNum(pId) + '" num="' + padNum(pId) + '">\n';
  xml += pad + '  <table frame="all">\n';
  if (table.title) {
    xml += pad + '    <title><b>' + escapeXml(table.title) + '</b></title>\n';
  }
  xml += pad + '    <tgroup cols="' + table.cols + '">\n';

  // 列定义
  for (let c = 1; c <= table.cols; c++) {
    xml += pad + '      <colspec column="' + c + '" colname="col' + c + '"/>\n';
  }

  // 表头
  if (table.headers.length > 0) {
    xml += pad + '      <thead>\n';
    xml += pad + '        <row>\n';
    table.headers.forEach(h => {
      xml += pad + '          <entry align="left" valign="top"><b>' + escapeXml(h) + '</b></entry>\n';
    });
    xml += pad + '        </row>\n';
    xml += pad + '      </thead>\n';
  }

  // 表体
  xml += pad + '      <tbody>\n';
  table.data.forEach(row => {
    xml += pad + '        <row>\n';
    row.forEach(cell => {
      xml += pad + '          <entry>' + escapeXml(cell.text) + '</entry>\n';
    });
    xml += pad + '        </row>\n';
  });
  xml += pad + '      </tbody>\n';

  xml += pad + '    </tgroup>\n';
  xml += pad + '  </table>\n';
  xml += pad + '</tables>\n';

  return xml;
}

function generateClaimsXml(sections) {
  let xml = '  <claims id="claim" lang="zh">\n';

  if (sections.length === 0) {
    xml += '    <!-- 未检测到权利要求 -->\n';
    xml += '  </claims>\n\n';
    return xml;
  }

  let claimId = 1;
  let inClaimMode = false;
  let currentClaimText = '';

  sections.forEach(sec => {
    sec.paragraphs.forEach(p => {
      const text = (p.text || '').trim();
      if (!text) return;

      // 检测是否以数字编号开头（如 "1.", "1、", "1）"）
      const claimMatch = text.match(/^(\d+)[\.\、\)）]\s*/);

      if (claimMatch) {
        // 开始新的权利要求
        if (currentClaimText) {
          xml += '    <claim id="c' + padNum(claimId) + '" num="' + padNum(claimId) + '">\n';
          xml += '      <claim-text>' + currentClaimText + '</claim-text>\n';
          xml += '    </claim>\n';
          claimId++;
        }
        currentClaimText = (p.formattedText || escapeXml(text));
      } else if (inClaimMode && currentClaimText) {
        // 续行
        currentClaimText += '\n          ' + (p.formattedText || escapeXml(text));
      } else if (!inClaimMode) {
        // 第一段但不以数字开头
        currentClaimText = (p.formattedText || escapeXml(text));
      }

      inClaimMode = true;
    });
  });

  // 最后一个 claim
  if (currentClaimText) {
    xml += '    <claim id="c' + padNum(claimId) + '" num="' + padNum(claimId) + '">\n';
    xml += '      <claim-text>' + currentClaimText + '</claim-text>\n';
    xml += '    </claim>\n';
  }

  xml += '  </claims>\n\n';
  return xml;
}

function generateAbstractXml(sections) {
  let xml = '  <abstract id="abst" lang="zh">\n';

  if (sections.length === 0) {
    xml += '    <!-- 未检测到摘要 -->\n';
    xml += '  </abstract>\n\n';
    return xml;
  }

  let pId = 1;
  sections.forEach(sec => {
    sec.paragraphs.forEach(p => {
      const text = (p.text || '').trim();
      if (!text) return;
      xml += '    <p id="absp' + padNum(pId) + '">' + (p.formattedText || escapeXml(text)) + '</p>\n';
      pId++;
    });
  });

  xml += '  </abstract>\n\n';
  return xml;
}

function generateDrawingsXml(sections, images, imgMode) {
  let xml = '  <drawings id="draw">\n';

  if (sections.length === 0 && images.length === 0) {
    xml += '  </drawings>\n\n';
    return xml;
  }

  let figNum = 1;
  images.forEach(img => {
    xml += '    <figure id="fig' + padNum(figNum) + '" num="' + padNum(figNum) + '">\n';
    if (img.base64) {
      xml += '      <img id="img' + padNum(figNum) + '" file="' + escapeXml(img.fileName || 'unknown') + '" ' +
             'img-content="drawing" img-format="' + (img.ext || 'png') + '" embedded="true" encoding="base64">' +
             img.base64 + '</img>\n';
    } else {
      xml += '      <img id="img' + padNum(figNum) + '" file="' + escapeXml(img.fileName || 'unknown') + '" ' +
             'img-content="drawing" img-format="' + (img.ext || 'png') + '"/>\n';
    }
    xml += '    </figure>\n';
    figNum++;
  });

  xml += '  </drawings>\n\n';
  return xml;
}

// ==================== 辅助函数 ====================
function padNum(n) {
  return String(n).padStart(4, '0');
}

function escapeXml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&apos;');
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function showSpinner() {
  spinner.classList.add('show');
}

function hideSpinner() {
  spinner.classList.remove('show');
}

function showError(msg) {
  outputArea.classList.add('show');
  xmlFull.textContent = '错误: ' + msg;
  xmlStat.textContent = '转换失败';
}

// ==================== 转换与输出 ====================
btnConvert.addEventListener('click', async () => {
  if (!parsedDocument) {
    alert('请先上传一个 .docx 文件');
    return;
  }

  const xml = await generateXml();
  if (!xml) return;

  // 显示结果
  displayXmlResults(xml);
  outputArea.classList.add('show');
  outputArea.scrollIntoView({ behavior: 'smooth' });
});

function displayXmlResults(xml) {
  // 提取各部分
  const descMatch = xml.match(/(  <description[\s\S]*?  <\/description>)/);
  const claimsMatch = xml.match(/(  <claims[\s\S]*?  <\/claims>)/);
  const abstMatch = xml.match(/(  <abstract[\s\S]*?  <\/abstract>)/);

  const size = new Blob([xml]).size;
  const lines = xml.split('\n').length;

  // 大文件截断显示，避免浏览器卡顿
  const MAX_PREVIEW = 500000; // 500KB preview limit
  const displayXml = xml.length > MAX_PREVIEW ?
    xml.substring(0, MAX_PREVIEW) + '\n\n<!-- ... XML truncated for preview (' + formatSize(size) + ' total). Download for full content. -->' :
    xml;

  xmlFull.textContent = displayXml;
  xmlDesc.textContent = descMatch ? (descMatch[1].length > MAX_PREVIEW ? descMatch[1].substring(0, MAX_PREVIEW) + '\n... (truncated)' : descMatch[1]) : '（未检测到说明书内容）';
  xmlClaims.textContent = claimsMatch ? claimsMatch[1] : '（未检测到权利要求书）';
  xmlAbst.textContent = abstMatch ? abstMatch[1] : '（未检测到摘要）';

  xmlStat.textContent = 'XML文件: ' + lines + ' 行 · ' + formatSize(size) + ' · 编码: UTF-8';

  // 切换到完整XML标签
  document.querySelectorAll('#output-tabs .tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('#output-tabs .tab-btn[data-tab="tab-xml-full"]').classList.add('active');
  document.querySelectorAll('#output-area .tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-xml-full').classList.add('active');
}

btnDownload.addEventListener('click', () => {
  if (!generatedXml) {
    alert('请先执行转换');
    return;
  }
  const blob = new Blob([generatedXml], { type: 'application/xml;charset=UTF-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const originalName = (currentDocxData?.name || 'document').replace(/\.docx$/i, '');
  a.href = url;
  a.download = originalName + '.xml';
  a.click();
  URL.revokeObjectURL(url);
});

btnCopy.addEventListener('click', () => {
  if (!generatedXml) {
    alert('请先执行转换');
    return;
  }
  navigator.clipboard.writeText(generatedXml).then(() => {
    btnCopy.textContent = '✓ 已复制';
    setTimeout(() => { btnCopy.textContent = '📋 复制完整XML'; }, 2000);
  }).catch(() => {
    alert('复制失败，请手动选择文本复制');
  });
});

// ==================== Tab切换 ====================
document.addEventListener('click', e => {
  if (e.target.classList.contains('tab-btn')) {
    const tabGroup = e.target.closest('.tabs');
    if (tabGroup) {
      tabGroup.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      const tabId = e.target.dataset.tab;
      const contentContainer = tabGroup.nextElementSibling?.parentElement || tabGroup.parentElement;
      if (contentContainer) {
        contentContainer.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        const target = document.getElementById(tabId);
        if (target) target.classList.add('active');
      }
    }
  }
});

})();
